version: "3.9"

services:
  backend:
    build: ./backend
    container_name: hostelops-backend
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/hostelops
    ports:
      - "5000:5000"  
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: hostelops-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx:alpine
    container_name: hostelops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mongo-data: